name: coursehub
description: CourseHub - 课程表管理应用
publish_to: 'none'
version: 1.0.5+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  
  pocketbase: ^0.18.1
  http: ^1.2.0
  url_launcher: ^6.2.2
  provider: ^6.1.1
  
  google_mlkit_text_recognition: ^0.13.0
  flutter_markdown: ^0.7.4+3
  markdown: ^7.2.1
  markdown_widget: ^2.3.0
  flutter_math_fork: ^0.7.2
  gpt_markdown: ^1.0.19
  awesome_notifications: ^0.11.0
  image: ^4.1.0
  timezone: ^0.9.4
  flutter_timezone: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  analyzer: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#4A90E2"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/coursehub_logo.jpg
